name: APEX6

on:
  push:
    paths-ignore:
      - '**'
      
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Forzar notificación Telegram (FORCE_NOTIFY=1)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run APEX6
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify || '0' }}
        run: python src/runner_apex6.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/histories/*.xlsx data/state.json data/picks_log.csv outputs/ || true
          git diff --cached --quiet || git commit -m "chore: update histories & picks [skip ci]"
          git push
