name: APEX6

on:
  push:
    paths-ignore:
      - '**'
  schedule:
    # Horarios en UTC. Santo Domingo (RD) = UTC-4 (sin horario de verano).
    - cron: "30 15 * * *"  # 11:30 AM RD — backfill / chequeo temprano
    - cron: "15 16 * * *"  # 12:15 PM RD — después de Quiniela La Primera (12:00)
    - cron: "15 17 * * *"  # 1:15 PM RD  — después de Anguila 1PM (13:00)
    - cron: "45 18 * * *"  # 2:45 PM RD  — después de Lotería Nacional Gana Más (14:30)
    - cron: "15 22 * * *"  # 6:15 PM RD  — después de Anguila 6PM (18:00)
    - cron: "20 1 * * *"   # 9:20 PM RD  — después de Anguila 9PM y Nacional Noche (21:00)
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Forzar notificación Telegram (FORCE_NOTIFY=1)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITEA_TOKEN }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run APEX6
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify || '0' }}
        run: python src/runner_apex6.py

      - name: Commit updated data
        run: |
          git config user.name  "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@noreply.local"
          git add data/histories/*.xlsx data/state.json data/picks_log.csv outputs/ || true
          git diff --cached --quiet || git commit -m "chore: update histories & picks [skip ci]"
          git push --force
